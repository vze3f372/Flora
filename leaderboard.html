<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPanel Leaderboard</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <main class="leaderboard-panel">
        <header class="leaderboard-header">
            <div id="leaderboard-title" class="leaderboard-title">LOADING</div>
            <div id="leaderboard-subtitle" class="leaderboard-subtitle">PLEASE WAIT</div>
        </header>

        <section class="leaderboard-table">
            <div id="leaderboard-columns" class="leaderboard-columns"></div>
            <div id="leaderboard-rows" class="leaderboard-rows">
                <div class="leaderboard-empty">Loading leaderboard...</div>
            </div>
        </section>
    </main>

    <script src="js/leaderboard.js"></script>
</body>
</html>
